version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: rune-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rune-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./backend/config.toml:/app/config.toml:ro
      - rune_db:/app/data
      - rune_workspace:/app/workspace
    environment:
      - RUNE_DATABASE_URL=sqlite:///app/data/rune.db
      - RUNE_CONFIG_PATH=/app/config.toml
      - RUNE_WORKSPACE_DIR=/app/workspace
      - RUNE_MEMORY__QDRANT_URL=http://qdrant:6333
      - RUST_LOG=info,rune=debug
    depends_on:
      - qdrant

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: rune-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
    depends_on:
      - backend

volumes:
  qdrant_data:
  rune_db:
  rune_workspace:
